<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechMarket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
}

/* NAVBAR */

nav{
background:#ffe600;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
}

.logo{
font-size:24px;
font-weight:600;
}

.cart{
background:#3483fa;
color:white;
padding:8px 12px;
border-radius:6px;
}

/* HERO */

.hero{
height:300px;
background:linear-gradient(120deg,#3483fa,#00c6ff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

.hero h1{
font-size:40px;
}

/* CATEGORIAS */

.categories{
display:flex;
justify-content:center;
gap:30px;
padding:30px;
}

.cat{
background:white;
padding:15px 25px;
border-radius:8px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.cat:hover{
transform:translateY(-5px);
}

/* PRODUCTOS */

.products{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#00a650;
font-size:20px;
font-weight:600;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

.modal img{
width:100%;
margin-bottom:15px;
}

.buy{
background:#3483fa;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.close{
margin-top:10px;
background:#ddd;
border:none;
padding:8px;
width:100%;
cursor:pointer;
}

</style>

</head>

<body>

<nav>

<div class="logo">TechMarket</div>

<div class="cart">🛒 <span id="cart">0</span></div>

</nav>

<section class="hero">

<h1>Bienvenido a TechMarket</h1>
<p>Selecciona una categoría</p>

</section>

<section class="categories">

<div class="cat" onclick="filterProducts('all')">Todos</div>
<div class="cat" onclick="filterProducts('phones')">📱 Smartphones</div>
<div class="cat" onclick="filterProducts('pc')">💻 Computadoras</div>
<div class="cat" onclick="filterProducts('audio')">🎧 Audio</div>

</section>

<section class="products" id="products"></section>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<img id="modal-img">

<h3 id="modal-title"></h3>

<p id="modal-desc"></p>

<p class="price" id="modal-price"></p>

<button class="buy" onclick="addToCart()">Comprar</button>

<button class="close" onclick="closeModal()">Cerrar</button>

</div>

</div>

<script>

let cart = 0;

let selectedProduct = null;

const products = [

{
name:"iPhone 15",
price:"$1.200.000",
category:"phones",
img:"https://picsum.photos/400/300?1",
desc:"Pantalla OLED, cámara 48MP, chip A16."
},

{
name:"Samsung Galaxy S23",
price:"$980.000",
category:"phones",
img:"https://picsum.photos/400/300?2",
desc:"Pantalla AMOLED 120Hz y cámara profesional."
},

{
name:"Notebook Gamer",
price:"$950.000",
category:"pc",
img:"https://picsum.photos/400/300?3",
desc:"RTX 4060, 16GB RAM."
},

{
name:"Auriculares Sony",
price:"$120.000",
category:"audio",
img:"https://picsum.photos/400/300?4",
desc:"Cancelación de ruido profesional."
}

];

function displayProducts(list){

const container = document.getElementById("products");

container.innerHTML="";

list.forEach(p=>{

container.innerHTML+=`

<div class="card" onclick="showProduct('${p.name}')">

<img src="${p.img}">

<div class="card-body">

<h3>${p.name}</h3>

<p class="price">${p.price}</p>

</div>

</div>

`;

});

}

function filterProducts(cat){

if(cat==="all"){

displayProducts(products);

}else{

displayProducts(products.filter(p=>p.category===cat));

}

}

function showProduct(name){

selectedProduct = products.find(p=>p.name===name);

document.getElementById("modal-img").src = selectedProduct.img;

document.getElementById("modal-title").innerText = selectedProduct.name;

document.getElementById("modal-desc").innerText = selectedProduct.desc;

document.getElementById("modal-price").innerText = selectedProduct.price;

document.getElementById("modal").style.display="flex";

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

function addToCart(){

cart++;

document.getElementById("cart").innerText = cart;

alert("Producto agregado al carrito");

closeModal();

}

displayProducts(products);

</script>

</body>

</html>
