<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#ebebeb;
}

/* Barra superior */
header{
    background:#ffe600;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.search{
    width:50%;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:4px;
}

/* Contenedor productos */

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

/* Tarjetas productos */

.product{
    background:white;
    border-radius:6px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.price{
    font-size:22px;
    color:#00a650;
    font-weight:bold;
}

button{
    background:#3483fa;
    color:white;
    border:none;
    padding:10px;
    border-radius:4px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#2968c8;
}

footer{
    margin-top:40px;
    text-align:center;
    padding:20px;
    background:#ddd;
}

</style>

</head>

<body>

<header>

<div class="logo">Mi Mercado</div>

<div class="search">
<input type="text" placeholder="Buscar productos...">
</div>

</header>


<div class="container">

<div class="product">
<img src="https://picsum.photos/200/200">
<h3>Producto 1</h3>
<p class="price">$10.000</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/201/200">
<h3>Producto 2</h3>
<p class="price">$15.000</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/202/200">
<h3>Producto 3</h3>
<p class="price">$8.000</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/203/200">
<h3>Producto 4</h3>
<p class="price">$20.000</p>
<button>Comprar</button>
</div>

</div>

<footer>
<p>© 2026 Mi Tienda Online</p>
</footer>

</body>
</html>
